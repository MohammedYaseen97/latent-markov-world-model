# Latent Markov arm — full A100 profile.
#
# Phase 0: freeze backbone, pretrain VAEStateEncoder + OutcomeHead on the
#           math_easy_pool (2974 problems × 8 rollouts = ~23,792 trajectories).
# Phase 1: unfreeze backbone (QLoRA), run GRPO with z injection on MATH-B-I.
#
# Inherits shared training knobs (lr, G, steps, backbone, dtype) from
# train_baseline_grpo.yaml. Only latent-specific fields are set here.
#
# Usage:
#   # 0. Generate the easy pool (pulls from HuggingFace — no upload needed)
#   python scripts/prepare_easy_pool.py
#
#   # 1. Generate Phase 0 rollouts (A100, ~2-3 h for 2974 problems × 8)
#   python scripts/generate_phase0_rollouts.py \
#       --pool-path data/math_easy_pool.jsonl \
#       --output-path data/phase0_rollouts.pt \
#       --n-rollouts 8 --seed 42
#
#   # 2. Train VAE — Phase 0
#   python scripts/train_latent.py \
#       --config configs/train_latent_grpo.yaml --phase 0
#
#   # 3. NFR6 gate — inspect latent structure before Phase 1
#   python scripts/check_latent_structure.py \
#       --rollout-path data/phase0_rollouts.pt \
#       --checkpoint-path runs/latent_grpo/phase0_vae.pt \
#       --output-dir runs/latent_grpo/plots --method umap
#
#   # 4. Phase 1 GRPO (only after NFR6 passes)
#   python scripts/train_latent.py \
#       --config configs/train_latent_grpo.yaml --phase 1

extends: "configs/train_baseline_grpo.yaml"

experiment:
  name: "latent_grpo"
  profile: "full"
  state_mode: "latent_markov"

# ---------------------------------------------------------------------------
# Latent arm architecture (shared across Phase 0 and Phase 1)
# ---------------------------------------------------------------------------
latent_markov:
  latent_dim: 64            # z_h dimension (design decision Q1)
  hidden_dim: 1536          # Qwen2.5-1.5B last-layer hidden size
  n_chunks: 3               # fixed: chunks per rollout
  chunk_tokens: 341         # tokens per chunk (341 × 3 = 1023 ≈ 1024)

# ---------------------------------------------------------------------------
# Phase 0 rollout generation (parameters for generate_phase0_rollouts.py)
# ---------------------------------------------------------------------------
phase0_rollouts:
  pool_path: "data/math_easy_pool.jsonl"
  output_path: "data/phase0_rollouts.pt"
  n_rollouts: 8             # G=8; match eval pass@8 budget
  total_tokens: 1024        # completion budget per rollout
  seed: 42
  temperature: 1.0
  top_p: 1.0

# ---------------------------------------------------------------------------
# Phase 0 — VAE pretraining on frozen backbone
# ---------------------------------------------------------------------------
phase0:
  rollout_path: "data/phase0_rollouts.pt"
  checkpoint_path: "runs/latent_grpo/phase0_vae.pt"

  # 3 epochs over the easy pool trajectories.
  # Pool v2 includes L1–L5 so the VAE sees harder trajectories, bridging
  # the distributional gap to Phase 1 MATH-B-I problems.
  num_epochs: 3
  batch_size: 256           # A100 80 GB handles this comfortably

  learning_rate: 3.0e-4     # AdamW; higher than RL lr (VAE is small, cold-start)

  # KL annealing: ramp kl_weight from 0 → 1 over the first kl_warmup_frac of
  # Phase 0 training steps. Prevents the posterior collapse (σ² ≈ prior) seen
  # in v1 where both correct/incorrect trajectories had indistinguishable σ².
  kl_warmup_frac: 0.5

  # Loss weights. Start balanced; tune only if NFR6 gate shows poor separation.
  lambda_elbo: 1.0
  lambda_trans: 1.0
  lambda_out: 1.0

  logging_steps: 10
  save_steps: 100

# ---------------------------------------------------------------------------
# Phase 1 — joint GRPO on MATH-B-I (inherits baseline training block)
# Overrides: seed to 11 (matches all latent arms), lambda weights added.
# ---------------------------------------------------------------------------
training:
  seed: 11
  # batch_size here = problems per gradient step (× G=8 rollouts each).
  # v1 used 1, giving only 200 problem-encounters over 200 steps vs the baseline's
  # ~800 (4 grad-accum × 1 problem × 200 steps). v2 uses 4 to close that gap:
  # 4 × 200 = 800 problem-encounters, matching the baseline's effective budget.
  # Gradient checkpointing keeps activation memory manageable on A100 80 GB.
  # If OOM occurs, fall back to batch_size=2 and double max_steps to 400.
  batch_size: 4
  gradient_checkpointing: true

# Phase 1 loss weights. Both are now wired in the code (v1 had lambda_vae as dead config).
# λ_vae = 0.05: soft VAE anchor. Prevents encoder drift without dominating L_RL.
# λ_trans: controlled by lambda_trans_schedule() warmup (0.1 → 0.5 over 200 steps).
#           The value here is documentation; the schedule function is authoritative.
phase1_loss:
  lambda_trans: 0.5   # peak value reached by lambda_trans_schedule at step 100
  lambda_vae: 0.05    # wired — L_VAE is scaled by this throughout Phase 1

# ---------------------------------------------------------------------------
# NFR6 diagnostic (check_latent_structure.py)
# ---------------------------------------------------------------------------
nfr6:
  rollout_path: "data/phase0_rollouts.pt"
  checkpoint_path: "runs/latent_grpo/phase0_vae.pt"
  output_dir: "runs/latent_grpo/plots"
  method: "umap"            # umap preferred on full dataset (faster than tsne at N≈24k)
