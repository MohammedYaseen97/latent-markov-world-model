# Latent Markov arm — full A100 profile  (v3 design).
#
# Phase 0: backbone FROZEN; VAE + ZInjector + OutcomeHead trained ONLINE.
#   Each step: generate G=8 rollouts per problem → re-run with grad → update VAE/ZInj.
#   200 steps × 4 problems × 8 rollouts = 6 400 on-policy trajectories.
# Phase 1: backbone UNFROZEN; on-policy GRPO with live z injection on MATH-B-I.
#   200 steps × 4 problems × 8 rollouts = 6 400 fresh rollouts.
#
# Inherits shared training knobs (lr, G, backbone, dtype) from
# train_baseline_grpo.yaml. Only latent-specific fields are set here.
#
# Usage:
#   # 0. Prepare easy pool (one-time, pulls from HuggingFace)
#   python scripts/prepare_easy_pool.py
#
#   # 1. Phase 0 — online VAE pretraining (A100, ~4-5 h for 200 steps)
#   python scripts/train_latent.py \
#       --config configs/train_latent_grpo.yaml --phase 0
#
#   # 2. Phase 1 — joint RL (only after Phase 0 completes)
#   python scripts/train_latent.py \
#       --config configs/train_latent_grpo.yaml --phase 1

extends: "configs/train_baseline_grpo.yaml"

experiment:
  name: "latent_grpo"
  profile: "full"
  state_mode: "latent_markov"

# ---------------------------------------------------------------------------
# Latent arm architecture (shared across Phase 0 and Phase 1)
# ---------------------------------------------------------------------------
latent_markov:
  latent_dim: 64            # z_h dimension (design decision Q1)
  hidden_dim: 1536          # Qwen2.5-1.5B last-layer hidden size
  n_chunks: 3               # fixed: chunks per rollout
  chunk_tokens: 341         # tokens per chunk (341 × 3 = 1023 ≈ 1024)

# ---------------------------------------------------------------------------
# Phase 0 — Online VAE pretraining on frozen backbone (v3)
# ---------------------------------------------------------------------------
phase0:
  pool_path: "data/math_easy_pool.jsonl"   # easy MATH problems
  checkpoint_path: "runs/latent_grpo/phase0_vae.pt"

  # 200 steps × 4 problems × 8 rollouts = 6 400 on-policy trajectories.
  # G=8 deliberate: within a step, some rollouts solve the problem and some fail,
  # providing reward variance for the OutcomeHead gradient even on easy problems.
  n_steps: 200
  batch_size: 4             # problems per gradient step
  num_generations: 8        # G rollouts per problem

  learning_rate: 3.0e-4     # AdamW for VAE+ZInjector+OutcomeHead; not applied to backbone

  # KL annealing: ramp kl_weight from 0 → 1 over the first kl_warmup_frac of
  # Phase 0 steps. Prevents posterior collapse (σ² ≈ prior) seen in v1.
  kl_warmup_frac: 0.5

  # Loss weights. Balanced by default; tune only if NFR6 diagnostic shows poor separation.
  lambda_elbo: 1.0
  lambda_trans: 1.0
  lambda_out: 1.0

  logging_steps: 10
  save_steps: 50

# ---------------------------------------------------------------------------
# Phase 1 — joint GRPO on MATH-B-I (inherits baseline training block)
# Overrides: seed to 11 (matches all latent arms), lambda weights added.
# ---------------------------------------------------------------------------
training:
  seed: 11
  # batch_size here = problems per gradient step (× G=8 rollouts each).
  # v1 used 1, giving only 200 problem-encounters over 200 steps vs the baseline's
  # ~800 (4 grad-accum × 1 problem × 200 steps). v2 uses 4 to close that gap:
  # 4 × 200 = 800 problem-encounters, matching the baseline's effective budget.
  # Gradient checkpointing keeps activation memory manageable on A100 80 GB.
  # If OOM occurs, fall back to batch_size=2 and double max_steps to 400.
  batch_size: 4
  gradient_checkpointing: true

# Phase 1 loss weights. Both are now wired in the code (v1 had lambda_vae as dead config).
# λ_vae = 0.05: soft VAE anchor. Prevents encoder drift without dominating L_RL.
# λ_trans: controlled by lambda_trans_schedule() warmup (0.1 → 0.5 over 200 steps).
#           The value here is documentation; the schedule function is authoritative.
phase1_loss:
  lambda_trans: 0.5   # peak value reached by lambda_trans_schedule at step 100
  lambda_vae: 0.05    # wired — L_VAE is scaled by this throughout Phase 1

# ---------------------------------------------------------------------------
# NFR6 diagnostic (check_latent_structure.py)
# ---------------------------------------------------------------------------
nfr6:
  checkpoint_path: "runs/latent_grpo/phase0_vae.pt"
  output_dir: "runs/latent_grpo/plots"
  method: "umap"            # umap preferred on large datasets (faster than tsne)
