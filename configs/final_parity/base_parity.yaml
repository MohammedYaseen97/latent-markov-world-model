# Shared final-run base for all four core arms (folder name is historical).
# Scope + fairness: PROJECT_CONTRACT.md
# Do not change per-arm unless the field is explicitly method-specific.

project:
  name: "latent-markov-world-model"
  phase: "final_parity"
  primary_metric: "pass@1024"
  mandatory_metrics: ["pass@1", "pass@16", "pass@1024"]

model:
  family: "Qwen2.5-1.5B-Instruct" # logical name; HF id in configs/base_model.yaml
  # Fallback = instruct-style DeepSeek R1 distill on Qwen 1.5B; switch all arms together if used.
  fallback_family: "DeepSeek-R1-Distill-Qwen-1.5B"

framework:
  rl_library: "trl"
  algorithm: "grpo"
  # Yuan paper stack reference (informative): rLLM + VERL
  yuan_reference_stack: "rLLM+VERL"

data:
  benchmark: "MATH-Beyond"
  benchmark_pool_path: "data/math_beyond_math_b_i_base.jsonl"
  optional_strict_pool_path: "data/math_beyond_hf_strict_all_models.jsonl"
  optional_full_pool_path: "data/math_beyond_full_181.jsonl"
  data_protocol: "reports/DATA_PROTOCOL.md"
  split_id: "math_b_i_base_v1"

training:
  # Locked values — identical across all four arms (PROJECT_CONTRACT.md fairness criteria).
  # Yuan's appendix reference values are noted in comments where they differ from ours.
  seed: 11
  learning_rate: 1.0e-6        # Yuan: 1e-6 ✓
  num_generations: 8           # Yuan: group_size 8 ✓ (TRL parameter name)
  batch_size: 8                # per_device_train_batch_size; must be a multiple of num_generations
                               # (Yuan used batch_size 128 on a different stack — we use 8 on single GPU)
  grad_accum_steps: 4          # effective prompts per weight update = 4
  max_completion_length: 1024  # tokens; enough for chain-of-thought + \boxed{answer}
  temperature: 1.0             # Yuan: 1.0 ✓
  top_p: 1.0
  num_epochs: 10               # 10 passes over 40-problem pool ≈ 50 weight updates
  max_steps: null              # null = governed by num_epochs
  gradient_checkpointing: false
  use_vllm: false
  # kl_coef: 0.001             # Yuan reference — TRL GRPO uses clipped objective, no KL term

evaluation:
  # Yuan reports 1.0; keep identical across all arms for fair comparison.
  temperature: 1.0
  ks: [1, 16, 1024]
  # TODO(config-freeze): fill decode settings once and inherit for all arms.
  top_p: null
  max_new_tokens: null
  num_samples_per_prompt:
    "1": 1
    "16": 16
    "1024": 1024

fair_comparison:
  require_shared_knobs_equal_across_arms: true
  require_pass_at_1024_for_all_arms: true
  require_artifact_backed_table: true
