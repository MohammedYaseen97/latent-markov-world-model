# Checkpoints for RL / eval (all four arms use the same primary, or the same fallback if you switch).
#
# MATH-B-I row list comes from Hub *base* model pass@1024 columns (see reports/DATA_PROTOCOL.md).
# That only defines WHICH problems are in the pool — not which Hugging Face checkpoint you must
# train. We use instruction-tuned weights for trainable rollouts; document in any writeup.

primary:
  huggingface_repo_id: "Qwen/Qwen2.5-1.5B-Instruct"
  tokenizer_repo_id: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"

# Same convention: instruct-style distill so behavior matches primary track (chat, follows prompts).
fallback:
  huggingface_repo_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  tokenizer_repo_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  dtype: "bfloat16"
